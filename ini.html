<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RPG Initiative Pro 4.0.2</title>
<style>
:root {
--bg-color: #0f172a;
--card-bg: #1e293b;
--accent: #f43f5e;
--text: #f1f5f9;
--secondary: #6366f1;
--effect-color: #38bdf8;
--player-color: #10b981;
--ready-color: #fbbf24;
--active-row: rgba(99, 102, 241, 0.3);
}

body {
font-family: 'Inter', system-ui, sans-serif;
background-color: var(--bg-color);
color: var(--text);
margin: 0;
padding: 10px;
display: flex;
flex-direction: column;
align-items: center;
}

.container { width: 100%; max-width: 500px; }

.section {
background: var(--card-bg);
padding: 15px;
border-radius: 16px;
margin-bottom: 20px;
box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

h2 { text-align: center; color: var(--accent); margin-top: 0; text-transform: uppercase; font-size: 0.9rem; }

.input-group { display: flex; gap: 8px; margin-bottom: 10px; }
input, select { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 8px; font-size: 1rem; width: 100%; }

.btn-add { background: var(--accent); border: none; color: white; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; flex-grow: 1; }
table { width: 100%; border-collapse: collapse; }
tr { transition: background 0.2s; }
tr.active-turn { background-color: var(--active-row); border-left: 5px solid var(--secondary); }
tr.is-ready { border-left: 5px solid var(--ready-color) !important; }
tr.is-waiting { opacity: 0.5; }
td { padding: 10px 4px; border-bottom: 1px solid #334155; }

.drag-handle { cursor: move; color: #475569; font-size: 1.2rem; padding-right: 10px; user-select: none; touch-action: none; }
.inline-init { width: 45px !important; padding: 6px 0 !important; text-align: center; font-weight: bold; background: #0f172a; border: 1px solid #475569; color: white; border-radius: 4px; }

.controls { display: flex; gap: 4px; justify-content: flex-end; }
.btn-tactic { background: #334155; border: none; color: white; padding: 6px 8px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; }
.btn-del { background: transparent; border: 1px solid #ef4444; color: #ef4444; padding: 5px 8px; border-radius: 4px; cursor: pointer; }

.round-box { background: var(--secondary); padding: 15px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.btn-next { background: #10b981; border: none; color: white; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
.effect-tag { font-size: 0.7rem; background: rgba(56, 189, 248, 0.15); color: var(--effect-color); padding: 2px 6px; border-radius: 4px; margin: 2px; display: inline-block; border: 1px solid var(--effect-color); }
.is-persistent { color: var(--player-color); font-weight: bold; }
</style>
</head>
<body>

<div class="container">
<div class="section">
<h2>⚔️ Initiative</h2>
<div class="input-group">
<input type="text" id="name" placeholder="Charakter">
<input type="number" id="init" placeholder="Ini" style="width:80px;">
</div>
<div style="display:flex; gap:10px; align-items:center;">
<label style="cursor:pointer; font-size: 0.85rem;"><input type="checkbox" id="persistent"> 🛡️ Gruppe</label>
<button class="btn-add" onclick="addCharacter()">HINZUFÜGEN</button>
</div>
</div>

<div class="section" style="padding: 5px;">
<table id="mainTable">
<tbody id="tableBody"></tbody>
</table>
</div>

<div class="round-box">
<div>RUNDE: <span id="roundDisplay" style="font-size: 1.4rem; font-weight: bold;">1</span></div>
<button class="btn-next" onclick="nextTurn()">Nächster Zug ➔</button>
</div>

<div class="section">
<h2 style="color:var(--effect-color)">✨ Effekt</h2>
<div class="input-group">
<input type="text" id="effName" placeholder="Effekt Name" style="flex:3;">
<input type="number" id="effDur" placeholder="Rnd" style="width:70px;">
<button class="btn-add" style="background:var(--effect-color)" onclick="addEffect()">OK</button>
</div>
<table id="effectTable">
<tbody id="effTableBody"></tbody>
</table>
</div>

<div style="display:flex; flex-direction:column; gap:10px; margin-bottom: 30px;">
<button onclick="endCombat()" class="btn-add" style="background:#3b82f6;">Kampf beenden</button>
<button onclick="clearAll()" style="background:transparent; border:none; color:#64748b; font-size: 0.8rem; cursor:pointer;">Alles löschen</button>
</div>
</div>

<script>
let characters = JSON.parse(localStorage.getItem('rpg_v402_init')) || [];
let effects = JSON.parse(localStorage.getItem('rpg_v402_effects')) || [];
let currentRound = parseInt(localStorage.getItem('rpg_v402_round')) || 1;
let activeCharId = localStorage.getItem('rpg_v402_active_id') || null;

function save() {
localStorage.setItem('rpg_v402_init', JSON.stringify(characters));
localStorage.setItem('rpg_v402_effects', JSON.stringify(effects));
localStorage.setItem('rpg_v402_round', currentRound);
localStorage.setItem('rpg_v402_active_id', activeCharId);
}

function addCharacter() {
const n = document.getElementById('name'), i = document.getElementById('init'), p = document.getElementById('persistent');
if(n.value && i.value) {
const newChar = {
id: "id_" + Date.now() + Math.random(),
name: n.value,
init: parseInt(i.value),
persistent: p.checked,
isReady: false, isWaiting: false
};
characters.push(newChar);
if (!activeCharId) activeCharId = newChar.id;
characters.sort((a, b) => b.init - a.init);
n.value = ''; i.value = ''; n.focus();
updateTables();
}
}

function nextTurn() {
if(characters.length === 0) return;
let currentIndex = characters.findIndex(c => c.id === activeCharId);
currentIndex++;

if (currentIndex >= characters.length || currentIndex < 0) {
currentIndex = 0;
currentRound++;
}

activeCharId = characters[currentIndex].id;

// Effekte am Zugbeginn reduzieren
effects = effects.map(e => {
if(e.ownerId === activeCharId) return { ...e, duration: e.duration - 1 };
return e;
}).filter(e => e.duration > 0);

characters[currentIndex].isReady = false;
characters[currentIndex].isWaiting = false;
updateTables();
}

// --- Drag & Drop ---
let dragIdx = null;

function onDragStart(e) {
dragIdx = parseInt(e.target.closest('tr').dataset.index);
e.dataTransfer.setData('text/plain', dragIdx);
}

function onDragOver(e) { e.preventDefault(); }

function onDrop(e) {
e.preventDefault();
const targetIdx = parseInt(e.target.closest('tr').dataset.index);
if (dragIdx !== null && dragIdx !== targetIdx) {
const item = characters.splice(dragIdx, 1)[0];
characters.splice(targetIdx, 0, item);
item.isWaiting = false; // Wiedereinstieg
updateTables();
}
dragIdx = null;
}

function updateTables() {
const tBody = document.getElementById('tableBody');
tBody.innerHTML = '';
document.getElementById('roundDisplay').innerText = currentRound;

characters.forEach((c, i) => {
const row = document.createElement('tr');
row.dataset.index = i;
row.draggable = true;
row.addEventListener('dragstart', onDragStart);
row.addEventListener('dragover', onDragOver);
row.addEventListener('drop', onDrop);

if(c.id === activeCharId) row.className = 'active-turn';
if(c.isReady) row.classList.add('is-ready');
if(c.isWaiting) row.classList.add('is-waiting');

const charEffs = effects.filter(e => e.ownerId === c.id);
const effHtml = charEffs.map(e => `<span class="effect-tag">${e.name} (${e.duration})</span>`).join('');

row.innerHTML = `
<td class="drag-handle">☰</td>
<td><input type="number" class="inline-init" value="${c.init}" onchange="updateIni('${c.id}', this.value)"></td>
<td style="width:100%; padding-left: 8px;">
<span class="${c.persistent ? 'is-persistent' : ''}">${c.name}</span>
<div style="line-height:1;">${effHtml}</div>
</td>
<td class="controls">
<button class="btn-tactic" onclick="delayTurn('${c.id}')">Wait</button>
<button class="btn-tactic" style="background:var(--ready-color); color:black;" onclick="toggleReady('${c.id}')">Ready</button>
${!c.persistent ? `<button class="btn-del" onclick="removeChar('${c.id}')">✕</button>` : ''}
</td>`;
tBody.appendChild(row);
});

const tEff = document.getElementById('effTableBody');
tEff.innerHTML = '';
effects.forEach((e, i) => {
const owner = characters.find(c => c.id === e.ownerId);
tEff.innerHTML += `<tr>
<td style="color:var(--effect-color); font-weight:bold; width:30px;">${e.duration}</td>
<td>${e.name} <small style="opacity:0.5;">(${owner ? owner.name : '?'})</small></td>
<td class="controls"><button class="btn-del" onclick="removeEff(${i})">✕</button></td>
</tr>`;
});
save();
}

function delayTurn(id) {
const idx = characters.findIndex(c => c.id === id);
const char = characters.splice(idx, 1)[0];
char.isWaiting = true;
characters.push(char);
// Falls der aktive Charakter wartet, springe zum nächsten
if(activeCharId === id) nextTurn();
else updateTables();
}

function toggleReady(id) {
const char = characters.find(c => c.id === id);
char.isReady = !char.isReady;
updateTables();
}

function updateIni(id, val) {
const char = characters.find(c => c.id === id);
char.init = parseInt(val) || 0;
characters.sort((a, b) => b.init - a.init);
updateTables();
}

function addEffect() {
const n = document.getElementById('effName'), d = document.getElementById('effDur');
if(n.value && d.value && activeCharId) {
effects.push({ name: n.value, duration: parseInt(d.value), ownerId: activeCharId });
n.value = ''; d.value = ''; updateTables();
}
}

function removeChar(id) { characters = characters.filter(c => c.id !== id); if(activeCharId === id) nextTurn(); else updateTables(); }
function removeEff(i) { effects.splice(i, 1); updateTables(); }
function endCombat() { if(confirm("Kampf beenden?")) { characters = characters.filter(c => c.persistent).map(c => ({...c, init:0, isWaiting:false, isReady:false})); effects = []; currentRound = 1; activeCharId = characters[0]?.id || null; updateTables(); } }
function clearAll() { if(confirm("Alles löschen?")) { localStorage.clear(); location.reload(); } }

updateTables();
</script>
</body>
</html>
